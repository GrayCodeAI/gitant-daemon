version: 2
updates:
  # Go modules
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - "@GrayCodeAI/maintainers"
    labels:
      - dependencies
      - go
    commit-message:
      prefix: "deps"
      include: scope

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    reviewers:
      - "@GrayCodeAI/maintainers"
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci"

  # Docker
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    reviewers:
      - "@GrayCodeAI/maintainers"
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "docker"
