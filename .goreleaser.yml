version: 2

project_name: gitant-daemon

before:
  hooks:
    - go mod tidy

builds:
  - id: gitant
    main: ./cmd/gitant/
    binary: gitant
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/lakshmanpatel/gitant/internal/api.Version={{.Version}}
      - -X github.com/lakshmanpatel/gitant/internal/api.Commit={{.Commit}}
      - -X github.com/lakshmanpatel/gitant/internal/api.BuildTime={{.Date}}

  - id: git-remote-gitant
    main: ./cmd/git-remote-gitant/
    binary: git-remote-gitant
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE*
      - README*
      - CHANGELOG*

dockers:
  - image_templates:
      - "ghcr.io/graycodeai/gitant-daemon:{{ .Version }}"
      - "ghcr.io/graycodeai/gitant-daemon:latest"
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--platform=linux/amd64"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: GrayCodeAI
    name: gitant-daemon
  prerelease: auto
