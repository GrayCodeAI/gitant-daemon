services:
  daemon:
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      - gitant-data:/home/gitant/.gitant
    environment:
      - GITANT_PORT=7777
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7777/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/gitant.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      daemon:
        condition: service_healthy
    restart: unless-stopped

volumes:
  gitant-data:
