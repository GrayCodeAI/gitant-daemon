# gitant reverse proxy configuration
# Place in /etc/nginx/sites-available/gitant and symlink to sites-enabled

upstream gitant_backend {
    server 127.0.0.1:7777;
    keepalive 32;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=gitant_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=gitant_git:10m rate=10r/s;

server {
    listen 80;
    server_name git.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name git.example.com;

    # TLS configuration
    ssl_certificate /etc/letsencrypt/live/git.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/git.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Request size limits
    client_max_body_size 50m;

    # API endpoints
    location /api/ {
        limit_req zone=gitant_api burst=50 nodelay;
        proxy_pass http://gitant_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Git smart HTTP endpoints (larger body sizes, different rate limit)
    location ~ ^/api/v1/repos/.*/(receive-pack|upload-pack|info/refs)$ {
        limit_req zone=gitant_git burst=20 nodelay;
        client_max_body_size 200m;
        proxy_pass http://gitant_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }

    # Health check (no rate limit)
    location = /health {
        proxy_pass http://gitant_backend;
        proxy_set_header Host $host;
    }

    # Metrics (restrict to internal)
    location = /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://gitant_backend;
    }

    # OpenAPI spec
    location = /api/v1/openapi.json {
        proxy_pass http://gitant_backend;
        proxy_set_header Host $host;
    }
}
