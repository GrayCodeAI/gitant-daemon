services:
  daemon:
    build: ./gitant-daemon
    ports:
      - "7777:7777"
    volumes:
      - gitant-data:/home/gitant/.gitant
    environment:
      GITANT_PORT: "7777"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7777/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build: ./gitant-web
    ports:
      - "3303:3000"
    environment:
      NEXT_PUBLIC_DAEMON_URL: http://daemon:7777
    depends_on:
      daemon:
        condition: service_healthy

volumes:
  gitant-data:
