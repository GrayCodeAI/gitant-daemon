services:
  daemon:
    build: .
    ports:
      - "7777:7777"
    volumes:
      - gitant-data:/home/gitant/.gitant
    environment:
      - GITANT_PORT=7777
      - GITANT_P2P=true
    command: ["serve", "--p2p", "--p2p-mdns"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7777/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  gitant-data:
